services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transport_ai}
      POSTGRES_USER: ${POSTGRES_USER:-transport_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - transport_ai_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transport_ai} -d ${POSTGRES_DB:-transport_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-transport_ai}
      DATABASE_USERNAME: ${POSTGRES_USER:-transport_ai}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME:?Set MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-${MAIL_USERNAME}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS}
      SESSION_HOURS: ${SESSION_HOURS:-12}
      UPLOAD_DIR: /data/uploads
    volumes:
      - transport_ai_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Set NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?Set NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  transport_ai_postgres:
  transport_ai_uploads:
