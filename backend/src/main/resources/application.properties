spring.application.name=backend
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Allow uploading large receipt images (up to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# Gemini API Key
gemini.api.key=${GEMINI_API_KEY:}

# Email delivery
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.auth.session-hours=${SESSION_HOURS:12}
app.auth.verification-cooldown-seconds=${VERIFICATION_COOLDOWN_SECONDS:60}
app.auth.max-verification-attempts=${MAX_VERIFICATION_ATTEMPTS:5}

# Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/transport_ai}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DATABASE_USERNAME:transport_ai}
spring.datasource.password=${DATABASE_PASSWORD:transport_ai}
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.open-in-view=false
